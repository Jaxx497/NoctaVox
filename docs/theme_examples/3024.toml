[colors]
surface_global      = "#090300"
surface_active      = "#2a2422"
surface_inactive    = "#050200"
surface_error       = "#db2d20"

text_primary        = "#d6d5d4"
text_secondary      = "#db2d20"
text_secondary_in   = "#8a1e16"
text_selection      = "#090300"
text_muted          = "#807d7c"

border_active       = "#01a0e4"
border_inactive     = "#4a4543"

accent              = "#01a252"
accent_inactive     = "#016b36"

[borders]
display             = true
style               = "thick"

[progress]
color               = ["#db2d20", "#01a252", "#01a0e4"]
speed               = 6

[progress.bar]
color               = ["#db2d20", "#fded02", "#01a252", "#01a0e4", "#a16a94"]
symbol_played       = "▰"
symbol_unplayed     = "▱"

[progress.spectrum]
mirror              = true
decay               = 0.86

[progress.waveform]
speed               = 4

[extras]
decorator           = "▣"
